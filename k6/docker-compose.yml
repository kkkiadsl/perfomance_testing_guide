version: '3.8'

# k6 성능 테스트 환경 (InfluxDB + Grafana 연동)
#
# 서비스 구성:
#   - influxdb:  테스트 결과 저장소 (포트 8086)
#   - grafana:   결과 시각화 대시보드 (포트 3001)
#   - k6:        부하 생성기 (테스트 실행 시에만 기동)
#
# 실행 방법:
#   1. 모니터링 스택 실행:
#      docker compose up -d influxdb grafana
#
#   2. k6 테스트 실행:
#      docker compose run --rm k6 run /scripts/example.js
#
#   3. 특정 옵션으로 테스트 실행:
#      docker compose run --rm k6 run \
#        --vus 50 --duration 3m \
#        /scripts/example.js
#
#   4. Grafana 대시보드:
#      http://localhost:3001 (admin/admin)

services:
  # ─── InfluxDB: k6 메트릭 저장소 ────────────────────────────────────
  influxdb:
    image: influxdb:1.8
    container_name: k6-influxdb
    ports:
      - "8086:8086"
    environment:
      INFLUXDB_DB: k6                    # k6 결과를 저장할 데이터베이스 이름
      INFLUXDB_HTTP_AUTH_ENABLED: "false" # 실습용: 인증 비활성화
    volumes:
      - influxdb-data:/var/lib/influxdb
    networks:
      - k6-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8086/ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─── Grafana: 결과 시각화 ────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: k6-grafana
    ports:
      - "3001:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"        # 실습용: 익명 접속 허용
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin        # 익명 사용자 권한
      GF_AUTH_DISABLE_LOGIN_FORM: "false"
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning  # 자동 프로비저닝
      - grafana-data:/var/lib/grafana
    depends_on:
      influxdb:
        condition: service_healthy
    networks:
      - k6-network
    restart: unless-stopped

  # ─── k6: 부하 생성기 ─────────────────────────────────────────────────
  # 테스트 실행 시에만 기동: docker compose run --rm k6 run /scripts/example.js
  k6:
    build: .                          # xk6-output-influxdb 확장 포함 커스텀 빌드
    container_name: k6-runner
    volumes:
      - ./scripts:/scripts   # 테스트 스크립트 마운트
    environment:
      # k6 결과를 InfluxDB로 전송 (v2 확장 방식)
      K6_OUT: xk6-influxdb=http://influxdb:8086
      K6_INFLUXDB_BUCKET: k6/autogen    # InfluxDB v1: 데이터베이스/리텐션폴리시
      # 기본 테스트 대상 URL (스크립트에서 __ENV.TARGET_URL 으로 참조)
      TARGET_URL: http://host.docker.internal:8080
    networks:
      - k6-network
    depends_on:
      influxdb:
        condition: service_healthy

networks:
  k6-network:
    driver: bridge

volumes:
  influxdb-data:
    driver: local
  grafana-data:
    driver: local
